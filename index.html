// ── PERSISTENT VIDEO STORE — IndexedDB ───────────────────────────────────────
// Stores raw video Blobs keyed by UUID. Survives page refresh, works on all
// modern browsers (iOS Safari 15.4+, Android Chrome, desktop).
const VIDDB = {
  _db: null,
  init(){
    return new Promise((res,rej)=>{
      const req = indexedDB.open("InspectProVideos",1);
      req.onupgradeneeded = e => e.target.result.createObjectStore("vids");
      req.onsuccess = e => { this._db=e.target.result; res(); };
      req.onerror   = e => { console.warn("IndexedDB unavailable:",e); res(); }; // graceful
    });
  },
  put(id, blob){
    if(!this._db) return Promise.resolve();
    return new Promise((res,rej)=>{
      const tx=this._db.transaction("vids","readwrite");
      tx.objectStore("vids").put(blob,id);
      tx.oncomplete=res; tx.onerror=rej;
    });
  },
  get(id){
    if(!this._db) return Promise.resolve(null);
    return new Promise((res,rej)=>{
      const tx=this._db.transaction("vids","readonly");
      const req=tx.objectStore("vids").get(id);
      req.onsuccess=()=>res(req.result||null);
      req.onerror=rej;
    });
  },
  del(id){
    if(!this._db) return Promise.resolve();
    return new Promise((res,rej)=>{
      const tx=this._db.transaction("vids","readwrite");
      tx.objectStore("vids").delete(id);
      tx.oncomplete=res; tx.onerror=rej;
    });
  },
  // Return all stored keys (for cleanup / archive listings)
  keys(){
    if(!this._db) return Promise.resolve([]);
    return new Promise((res,rej)=>{
      const tx=this._db.transaction("vids","readonly");
      const req=tx.objectStore("vids").getAllKeys();
      req.onsuccess=()=>res(req.result||[]);
      req.onerror=rej;
    });
  },
};

const wkKey  = d=>{const{week,year}=isoWk(d);return `${year}-W${String(week).padStart(2,"0")}`;};

// ── PIN PAD ───────────────────────────────────────────────────────────────────
function PinPad({onComplete,label,error}){
  const [digits,setDigits]=useState([]);
  const press=d=>{
    if(digits.length>=4)return;
    const n=[...digits,d];setDigits(n);
    if(n.length===4)onComplete(n.join(""));
  };
  const del=()=>setDigits(p=>p.slice(0,-1));
  useEffect(()=>{if(error)setDigits([]);},[error]);
  return <div style={{textAlign:"center"}}>
    <div style={{fontSize:14,color:"var(--t2)",marginBottom:16}}>{label}</div>
    <div style={{display:"flex",gap:12,justifyContent:"center",marginBottom:20}}>
      {[0,1,2,3].map(i=><span key={i} className={`pin-dot${i<digits.length?" on":""}`}/>)}
    </div>
    {error&&<div style={{fontSize:13,color:"var(--red)",background:"var(--op-bg)",padding:"6px 12px",borderRadius:7,marginBottom:12}}>{error}</div>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,maxWidth:210,margin:"0 auto"}}>
      {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((k,i)=>

      )}
    </div>
  </div>;
}

// ── VIDEO CAPTURE ─────────────────────────────────────────────────────────────
// Strategy:
//   Mobile (iOS / Android): file input with capture="environment" → native camera app.
//   Desktop: MediaRecorder with 10 s timer (+ file upload fallback).
//   All captured blobs are saved to IndexedDB immediately so they persist.
function VideoCapture({onCapture}){
  const [rec,setRec]=useState(false);
  const [ct,setCt]=useState(0);
  const [saving,setSaving]=useState(false);
  const mrRef=useRef(null);
  const stRef=useRef(null);
  const ivRef=useRef(null);
  const mobileRef=useRef(null); // <input capture> for mobile
  const desktopRef=useRef(null); // <input> file fallback for desktop

  // Detect mobile heuristic (touch device)
  const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

  const saveBlob=async(blob,name)=>{
    setSaving(true);
    try{
      const id=uid();
      await VIDDB.put(id,blob);
      onCapture({type:"video",id,size:blob.size,name:name||"video.webm",mimeType:blob.type});
    }catch(e){console.error("Video save error:",e);}
    setSaving(false);
  };

  // Mobile: use native camera via file input
  const onMobileFile=async e=>{
    const f=e.target.files?.[0];if(!f)return;
    await saveBlob(f,f.name);
    e.target.value="";
  };

  // Desktop: MediaRecorder
  const startDesktop=async()=>{
    // First try MediaRecorder
    try{
      // Try common MIME types in order of preference
      const mimes=["video/mp4;codecs=avc1","video/webm;codecs=vp9","video/webm;codecs=vp8","video/webm","video/mp4"];
      const mime=mimes.find(m=>MediaRecorder.isTypeSupported?.(m))||"";
      const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1280},height:{ideal:720}},audio:true});
      stRef.current=stream;
      const mr=new MediaRecorder(stream,mime?{mimeType:mime}:{});
      mrRef.current=mr;
      const chunks=[];
      mr.ondataavailable=e=>e.data.size>0&&chunks.push(e.data);
      mr.onstop=async()=>{
        const blob=new Blob(chunks,{type:mr.mimeType||"video/webm"});
        stream.getTracks().forEach(t=>t.stop());
        clearInterval(ivRef.current);
        setRec(false);setCt(0);
        await saveBlob(blob,"recording.webm");
      };
      mr.start(200);setRec(true);setCt(10);
      ivRef.current=setInterval(()=>setCt(c=>{if(c<=1){stopDesktop();return 0;}return c-1;}),1000);
    }catch{
      desktopRef.current?.click();
    }
  };
  const stopDesktop=()=>{
    clearInterval(ivRef.current);
    if(mrRef.current?.state==="recording")mrRef.current.stop();
  };

  // Desktop file fallback
  const onDesktopFile=async e=>{
    const f=e.target.files?.[0];if(!f)return;
    await saveBlob(f,f.name);
    e.target.value="";
  };

  if(saving) return <div style={{display:"inline-flex",alignItems:"center",gap:6,fontSize:13,color:"var(--t2)"}}>
    <span style={{width:14,height:14,border:"2px solid var(--bd2)",borderTopColor:"var(--amber)",borderRadius:"50%",animation:"spin .8s linear infinite",display:"inline-block"}}/> Saving…
  </div>;

  return <div style={{display:"inline-flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
    {isMobile
      // ── Mobile: one button opens native camera ──
      ? <>
          <button onClick={()=>mobileRef.current?.click()} style={C.btn("ghost",{padding:"6px 12px",fontSize:13})}>🎥 Video</button>
          <input type="file" accept="video/*" capture="environment" ref={mobileRef} onChange={onMobileFile} style={{display:"none"}}/>
        </>
      // ── Desktop: record or upload ──
      : !rec
        ? <div style={{display:"inline-flex",gap:6}}>

// Loads blob from IndexedDB, renders an inline <video> preview with controls.
// Falls back to an icon if blob no longer available (shouldn't happen with IndexedDB).
function VideoThumb({id,size=72,onRemove}){
  const [url,setUrl]=useState(null);
  const [err,setErr]=useState(false);
  useEffect(()=>{
    let objectUrl=null;
    VIDDB.get(id).then(blob=>{
      if(blob){objectUrl=URL.createObjectURL(blob);setUrl(objectUrl);}
      else setErr(true);
    }).catch(()=>setErr(true));
    return()=>{if(objectUrl)URL.revokeObjectURL(objectUrl);};
  },[id]);

  if(err) return <div style={{width:size,height:size,borderRadius:6,background:"var(--bd)",border:"1px solid var(--bd2)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,flexShrink:0,position:"relative"}}>

    <Mono size={8} color="var(--red)">Not found</Mono>

  </div>;

  if(!url) return <div style={{width:size,height:size,borderRadius:6,background:"var(--bd)",border:"1px solid var(--bd2)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>

// Compress a base64 photo to a small thumbnail for email embedding.
// Target: ~150px wide, JPEG q=0.55 → typically 8–15 KB per photo.
async function compressPhoto(dataUrl, maxPx=150, quality=0.55) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => resolve(dataUrl); // fallback: use original
    img.src = dataUrl;
  });
}

// Build a clean, simple HTML report email.
// Photos are compressed to thumbnails (~10 KB each) to stay under EmailJS 50 KB limit.
// Videos listed as note only – blobs can't be emailed.
async function buildEmailContent(rec, users) {
  const inspector = users.find(u => u.id === rec.userId);
  const dur = rec.endTime ? fDur(rec.endTime - rec.startTime) : '–';
  const allItems = rec.zones.flatMap(z => z.items.map(i => ({
    ...i,
    zoneId: z.zoneId,
    zoneName: ALL_ZONES.find(zz => zz.id === z.zoneId)?.name || z.zoneId,
  })));
  const flagged = allItems.filter(i => i.status === 'flagged');
  const okCount = allItems.filter(i => i.status === 'ok').length;
  const zonesStr = rec.zones.map(z => z.zoneId).join(', ');

  // Pre-compress flagged-item photos to tiny thumbnails for email.
  // 60px × q=0.25 → ~1.5–3 KB each as base64, safe under EmailJS 50 KB limit.
  const compressedPhotos = new Map(); // "fIdx_pIdx" → compressed dataUrl

async function sendEmail(to, name, subj, content, cfg={}) {
  const ej = {...window.EJ, ...cfg};
  if (!ej.publicKey) {
    console.log('Email simulated →', to, '\n\n' + content.plainText);
    return { ok: false, sim: true };
  }
  try {
    if (typeof emailjs === 'undefined') throw new Error('EmailJS not loaded');
    emailjs.init(ej.publicKey);
    await emailjs.send(ej.serviceId, ej.templateId, {
      to_email: to,
      to_name:  name,
      subject:  subj,
      message:  content.plainText,   // plain text fallback ({{message}})
      body_html: content.html,        // full HTML (use {{{body_html}}} in template)
    });
    return { ok: true };
  } catch(e) {
    return { ok: false, err: e.message };
  }
}

    </div>

    {/* Stats */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(145px,1fr))",gap:8,marginBottom:16}}>
      {[
        {l:"Open Issues",v:open,c:open>0?"var(--red)":"var(--green)"},
        {l:"Inspections (Wk)",v:wkInsp,c:"var(--blue)"},
        {l:"Zones",v:ALL_ZONES.length,c:"var(--cyan)"},
        {l:"Today's Slots",v:todayAll.length,c:"var(--purple)"},

      </div>)}

    {/* My assignment today (if logged in and not guest) */}

      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:mySlots.length?12:0}}>
        <Avatar user={authUser} size={38}/>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:15,color:"var(--t1)"}}>{authUser.name}</div>
          <Mono size={12}>{authUser.role.toUpperCase()}</Mono>
        </div>
        {mySlots.length
          ? <span style={{fontSize:12,fontWeight:700,background:"var(--cl-bg)",color:"var(--cl-fg)",padding:"4px 10px",borderRadius:20}}>✓ Assigned Today</span>
          : <span style={{fontSize:12,fontWeight:700,background:"var(--pd-bg)",color:"var(--pd-fg)",padding:"4px 10px",borderRadius:20}}>No assignment today</span>
        }
      </div>
      {mySlots.length>0&&<div style={{display:"flex",flexDirection:"column",gap:6}}>
        {mySlots.map((s,i)=>{
          const z=ALL_ZONES.find(z=>z.id===s.zoneId);
          const role=(s.supervisorIds||[]).includes(authUser.id)?"Supervising":"Inspecting";
          return <div key={i} style={{background:"var(--surf)",borderRadius:8,padding:"9px 12px",display:"flex",alignItems:"center",gap:10}}>
            <Mono size={12} color="var(--blue)" style={{background:"var(--bbg)",padding:"3px 8px",borderRadius:5,flexShrink:0}}>{s.zoneId}</Mono>
            <span style={{flex:1,fontSize:14,fontWeight:600,color:"var(--t1)"}}>{z?.name}</span>
            <Mono size={11} color="var(--t3)">{role}</Mono>
          </div>;
        })}
      </div>}
      {!mySlots.length&&authUser.role==="inspector"&&<div style={{fontSize:13,color:"var(--t3)",marginTop:8}}>
        Today's assignments: {todayAll.length===0?"No slots scheduled.":<span style={{color:"var(--t2)"}}>{todayAll.map(s=>{const u=users.find(u=>(s.inspectorIds||[]).includes(u.id));const z=ALL_ZONES.find(z=>z.id===s.zoneId);return `${u?.name?.split(" ")[0]||"?"} → ${s.zoneId}`;}).join(" · ")}</span>}
      </div>}
    </div>}

    {/* Today all slots */}
    <div style={C.card({marginBottom:14})}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:8}}>
        <span style={{fontWeight:700,fontSize:15,color:"var(--t1)"}}>Today's Roster <Mono size={11} style={{marginLeft:6,background:"var(--surf)",padding:"2px 7px",borderRadius:20,textTransform:"uppercase"}}>{dn} WK{String(week).padStart(2,"0")}</Mono></span>
        {isM&&<button onClick={()=>setAddM(true)} style={C.btn("pri",{padding:"5px 12px",fontSize:13})}>+ Add Slot</button>}
      </div>
      {todayAll.length===0
        ? <div style={{padding:"18px 0",textAlign:"center",color:"var(--t3)",fontSize:14}}>No assignments today.{isM&&<span onClick={()=>setAddM(true)} style={{color:"var(--amber)",cursor:"pointer",marginLeft:6}}>Add →</span>}</div>
        : <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {todayAll.map((s,i)=>{
              const z=ALL_ZONES.find(z=>z.id===s.zoneId);
              const insps=(s.inspectorIds||[]).map(id=>users.find(u=>u.id===id));
              const sups=(s.supervisorIds||[]).map(id=>users.find(u=>u.id===id));
              return <div key={i} style={{background:"var(--card2)",border:"1px solid var(--bd2)",borderRadius:9,padding:"11px 14px",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                <Mono size={12} color="var(--blue)" style={{background:"var(--bbg)",padding:"3px 8px",borderRadius:5,flexShrink:0}}>{s.zoneId}</Mono>
                <span style={{fontWeight:600,fontSize:14,color:"var(--t1)",flex:1,minWidth:120}}>{z?.name}</span>
                <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                  {insps.map((u,j)=>u&&<div key={j} style={{display:"flex",alignItems:"center",gap:5}}>
                    <Avatar user={u} size={24}/><span style={{fontSize:13,color:"var(--t2)"}}>{u.name.split(" ")[0]}</span>
                  </div>)}
                  {sups.map((u,j)=>u&&<div key={j} style={{display:"flex",alignItems:"center",gap:4,background:"var(--abg)",borderRadius:20,padding:"2px 8px"}}>
                    <Avatar user={u} size={18}/><span style={{fontSize:12,color:"var(--amber)"}}>{u.name.split(" ")[0]}</span><Mono size={10} color="var(--t3)">sup</Mono>
                  </div>)}
                </div>
                {isM&&<button onClick={()=>setRoster(p=>({...p,[wk]:{...(p[wk]||{}),[dn]:(p[wk]?.[dn]||[]).filter((_,j)=>j!==i)}}))} style={{background:"none",border:"none",color:"var(--t3)",cursor:"pointer",fontSize:14,padding:2}}>✕</button>}
              </div>;
            })}
          </div>
      }
    </div>

    {/* Week coverage for managers */}
    {isM&&<div style={C.card({marginBottom:14})}>
      <div style={{fontWeight:700,fontSize:14,color:"var(--t1)",marginBottom:12}}>This Week's Coverage</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:5}}>
        {DAYS.map((day,idx)=>{
          const dd=new Date(getMon(today));dd.setDate(dd.getDate()+idx);
          const isT=dd.toDateString()===today.toDateString();
          const slots=roster[wk]?.[day]||[];
          return <div key={day} style={{background:isT?"var(--abg)":"var(--surf)",border:`1px solid ${isT?"var(--abd)":"var(--bd)"}`,borderRadius:8,padding:"8px 6px",textAlign:"center",minHeight:70}}>
            <div style={{fontSize:12,fontWeight:700,color:isT?"var(--amber)":"var(--t2)",marginBottom:2}}>{day}</div>
            <Mono size={10} style={{display:"block",marginBottom:5}}>{fS(dd)}</Mono>
            {slots.length===0?<Mono size={9} style={{background:"var(--card)",padding:"1px 4px",borderRadius:3,display:"inline-block"}}>–</Mono>:
              slots.map((s,i)=>{const u=users.find(u=>(s.inspectorIds||[]).includes(u.id));return <div key={i} title={`${u?.name} → ${s.zoneId}`} style={{width:9,height:9,borderRadius:"50%",background:u?.color||"var(--blue)",margin:"2px auto"}}/>;})
            }
          </div>;
        })}
      </div>
    </div>}

    {/* Open issues */}
    {open>0&&<div style={C.card()}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,gap:8}}>
        <span style={{fontWeight:700,fontSize:15,color:"var(--t1)"}}>Open Issues <span style={{color:"var(--red)"}}>({open})</span></span>
        <button onClick={()=>nav("tracker")} style={C.btn("ghost",{padding:"5px 12px",fontSize:13})}>All →</button>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {tracker.filter(i=>i.status!=="closed").slice(0,5).map(item=>{
          const u=users.find(u=>u.id===item.createdBy);
          return <div key={item.id} style={{display:"flex",alignItems:"center",gap:9,background:"var(--card2)",borderRadius:8,padding:"9px 12px",border:"1px solid var(--bd)"}}>
            <Badge status={item.status}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:14,fontWeight:600,color:"var(--t1)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.itemLabel}</div>
              <Mono size={11} color="var(--t3)">{item.zoneName} · {fD(item.createdAt)}</Mono>
            </div>
            <Avatar user={u} size={24}/>
          </div>;
        })}
      </div>
    </div>}

    {/* Manager: add slot modal */}
    {addM&&<Modal onClose={()=>setAddM(false)} title={`Add Slot – Today (${dn})`}>
      <Lbl>Zone</Lbl>
      <select value={af.zoneId} onChange={e=>setAf(f=>({...f,zoneId:e.target.value}))} style={C.inp({marginBottom:12})}>
        <option value="">— Select zone —</option>
        {ALL_ZONES.map(z=><option key={z.id} value={z.id}>{z.id} – {z.name}</option>)}
      </select>
      <Lbl>Inspector</Lbl>
      <select value={af.inspId} onChange={e=>setAf(f=>({...f,inspId:e.target.value}))} style={C.inp({marginBottom:12})}>
        <option value="">— Select —</option>
        {users.filter(u=>u.role==="inspector").map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
      </select>
      <Lbl>Supervisor (optional)</Lbl>
      <select value={af.supId} onChange={e=>setAf(f=>({...f,supId:e.target.value}))} style={C.inp({marginBottom:16})}>
        <option value="">None</option>
        {users.filter(u=>u.role==="manager").map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
      </select>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button onClick={()=>setAddM(false)} style={C.btn("ghost")}>Cancel</button>
        <button onClick={addSlot} disabled={!af.inspId||!af.zoneId} style={{...C.btn("pri"),opacity:(!af.inspId||!af.zoneId)?0.35:1}}>Add</button>
      </div>
    </Modal>}
  </div>;
}

// ── INSPECT ───────────────────────────────────────────────────────────────────
function SelectStep({users,authUser,roster,today,startInspection}){
  const wk=wkKey(today);const dn=dowN(today);
  const todaySlots=roster[wk]?.[dn]||[];
  const mySlots=todaySlots.filter(s=>(s.inspectorIds||[]).includes(authUser?.id)||(s.supervisorIds||[]).includes(authUser?.id));
  const [custom,setCustom]=useState(false);
  const [selZone,setSelZone]=useState("");

  const doStart=zoneId=>{
    startInspection(authUser.id,zoneId);
  };

  return <div style={{maxWidth:580,margin:"0 auto"}} className="fu">
    <h1 style={{fontSize:24,letterSpacing:"-.02em",marginBottom:4}}>Start Inspection</h1>
    <p style={{color:"var(--t2)",fontSize:15,marginBottom:20}}>Inspecting as:</p>

    {/* Who I am */}
    <div style={{display:"flex",alignItems:"center",gap:12,padding:"13px 16px",background:"var(--card2)",border:"1px solid var(--bd2)",borderRadius:10,marginBottom:18}}>
      <Avatar user={authUser} size={44}/>
      <div style={{flex:1}}>
        <div style={{fontWeight:700,fontSize:16,color:"var(--t1)"}}>{authUser?.name}</div>
        <Mono size={12}>{authUser?.role?.toUpperCase()} · {authUser?.id}</Mono>
      </div>
    </div>

    {/* Today's assignment */}
    {mySlots.length>0
      ? <div style={C.card({marginBottom:14,border:"1px solid var(--green)33"})}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
            <span style={{fontSize:13,fontWeight:700,background:"var(--cl-bg)",color:"var(--cl-fg)",padding:"3px 10px",borderRadius:20}}>✓ Assigned Today</span>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {mySlots.map((s,i)=>{
              const z=ALL_ZONES.find(z=>z.id===s.zoneId);
              const sups=(s.supervisorIds||[]).map(id=>users.find(u=>u.id===id)).filter(Boolean);
              return <div key={i} style={{background:"var(--surf)",borderRadius:9,padding:"12px 14px",display:"flex",alignItems:"center",gap:12}}>
                <Mono size={13} color="var(--blue)" style={{background:"var(--bbg)",padding:"4px 9px",borderRadius:6,flexShrink:0}}>{s.zoneId}</Mono>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:15,color:"var(--t1)"}}>{z?.name}</div>
                  <Mono size={11} color="var(--t3)">{z?.items.length} checklist items{sups.length>0?` · Supervisor: ${sups.map(u=>u.name.split(" ")[0]).join(", ")}`:""}</Mono>
                </div>
                <button onClick={()=>doStart(s.zoneId)} style={C.btn("pri",{padding:"9px 18px",fontSize:14})}>Start →</button>
              </div>;
            })}
          </div>
        </div>
      : <div style={{...C.card({marginBottom:14}),border:"1px solid var(--pd-bd2)"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <span style={{fontSize:13,fontWeight:700,background:"var(--pd-bg)",color:"var(--pd-fg)",padding:"3px 10px",borderRadius:20}}>No Assignment Today</span>
          </div>
          {todaySlots.length>0&&<div style={{fontSize:13,color:"var(--t3)",lineHeight:1.8}}>Today's assignments:<br/>
            {todaySlots.map((s,i)=>{const u=users.find(u=>(s.inspectorIds||[]).includes(u.id));const z=ALL_ZONES.find(z=>z.id===s.zoneId);return <span key={i}><span style={{color:"var(--t2)"}}>{u?.name?.split(" ")[0]}</span> → {z?.name}{i<todaySlots.length-1?", ":""}</span>;})}
          </div>}
          <p style={{fontSize:13,color:"var(--t3)",marginTop:8}}>You can still proceed with a zone inspection below.</p>
        </div>
    }

    {/* Inspect another / any zone */}
    <div style={C.card({background:"var(--card2)"})}>
      <button onClick={()=>setCustom(c=>!c)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--t2)",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:6,padding:0}}>
        {custom?"▲":"▼"} Inspect a different zone
      </button>
      {custom&&<div style={{marginTop:14}}>
        <Lbl>Select Zone</Lbl>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {ALL_ZONES.map(z=>{
            const myZoneIds=mySlots.map(s=>s.zoneId);
            const isAssigned=myZoneIds.includes(z.id);
            return <div key={z.id} onClick={()=>setSelZone(z.id)} style={{background:selZone===z.id?"var(--bbg)":"var(--surf)",border:`1px solid ${selZone===z.id?"var(--blue)":"var(--bd)"}`,borderRadius:8,padding:"10px 13px",cursor:"pointer",transition:"all .15s"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <Mono size={12} color="var(--blue)" style={{background:"var(--bbg)",padding:"2px 7px",borderRadius:4,flexShrink:0}}>{z.id}</Mono>
                <span style={{fontWeight:600,fontSize:14,color:"var(--t1)",flex:1}}>{z.name}</span>
                {isAssigned&&<Mono size={10} color="var(--amber)">★ Your zone</Mono>}
                {selZone===z.id&&<span style={{color:"var(--blue)"}}>✓</span>}
              </div>
            </div>;
          })}
        </div>
        <button onClick={()=>selZone&&doStart(selZone)} disabled={!selZone} style={{...C.btn("pri",{marginTop:14,width:"100%",padding:"12px",fontSize:14}),opacity:selZone?1:.35}}>
          {selZone?`Start ${selZone} →`:"Select a zone"}
        </button>
      </div>}
    </div>
  </div>;
}

function ZoneStep({inspection,zoneIdx,updateItem,finishZone,users}){
  const zd=inspection.zones[zoneIdx];
  const zone=ALL_ZONES.find(z=>z.id===zd.zoneId);
  const user=users.find(u=>u.id===inspection.userId);
  const total=inspection.zones.length;
  const allDone=zd.items.every(i=>i.status!=="pending");
  const photoRefs=useRef({});

  const addMedia=(idx,mediaObj)=>updateItem(zoneIdx,idx,{media:[...(zd.items[idx].media||[]),mediaObj]});
  const removeMedia=(idx,mIdx)=>updateItem(zoneIdx,idx,{media:(zd.items[idx].media||[]).filter((_,j)=>j!==mIdx)});

  const handlePhoto=(idx,e)=>{
    const f=e.target.files?.[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>addMedia(idx,{type:"photo",data:ev.target.result});r.readAsDataURL(f);
    e.target.value="";
  };

  return <div style={{maxWidth:680,margin:"0 auto"}} className="fu">
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
      <Avatar user={user} size={34}/>
      <div style={{flex:1}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
          <Mono size={12}>Zone {zoneIdx+1} of {total}</Mono>
          <Mono size={12}>{zd.items.filter(i=>i.status!=="pending").length}/{zd.items.length} done</Mono>
        </div>
        <div style={{display:"flex",gap:3}}>{inspection.zones.map((_,i)=><div key={i} style={{flex:1,height:4,borderRadius:2,background:i<zoneIdx?"var(--green)":i===zoneIdx?"var(--amber)":"var(--bd)",transition:"background .3s"}}/>)}</div>
      </div>
    </div>

    <div style={{...C.card({background:"var(--card2)",marginBottom:12,padding:"14px 16px"}),display:"flex",alignItems:"center",gap:12}}>
      <div style={{width:46,height:46,background:"var(--bbg)",border:"1px solid var(--blue)33",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
        <Mono size={13} color="var(--blue)">{zone?.id}</Mono>
      </div>
      <div><h2 style={{fontSize:17,marginBottom:2,color:"var(--t1)"}}>{zone?.name}</h2><Mono size={12}>{zd.startTime?`Started ${fT(zd.startTime)}`:"–"}</Mono></div>
    </div>

    <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:16}}>
      {zd.items.map((item,idx)=>{
        const media=item.media||[];
        return <div key={idx} style={{background:item.status==="flagged"?"var(--fl-bg)":item.status==="ok"?"var(--ok-bg)":"var(--card)",border:`1px solid ${item.status==="flagged"?"var(--fl-bd)":item.status==="ok"?"var(--ok-fg)33":"var(--bd)"}`,borderRadius:10,padding:"12px 14px",transition:"all .2s"}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:9}}>
            <div style={{display:"flex",gap:5,flexShrink:0}}>
              <button onClick={()=>updateItem(zoneIdx,idx,{status:"ok"})} style={{width:32,height:32,borderRadius:7,cursor:"pointer",fontSize:14,border:`1px solid ${item.status==="ok"?"var(--green)":"var(--bd2)"}`,background:item.status==="ok"?"var(--green)":"transparent",color:item.status==="ok"?"#fff":"var(--t3)",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s"}} title="OK">✓</button>
              <button onClick={()=>updateItem(zoneIdx,idx,{status:item.status==="flagged"?"pending":"flagged"})} style={{width:32,height:32,borderRadius:7,cursor:"pointer",fontSize:14,border:`1px solid ${item.status==="flagged"?"var(--red)":"var(--bd2)"}`,background:item.status==="flagged"?"var(--red)":"transparent",color:item.status==="flagged"?"#fff":"var(--t3)",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s"}} title="Flag">!</button>
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:15,fontWeight:600,color:"var(--t1)",lineHeight:1.4}}>{item.label}</div>
              {/* Observation text – always available (OK or Flagged) */}
              {item.status!=="pending"&&<textarea
                placeholder={item.status==="ok"?"Optional notes…":"Describe the issue…"}
                value={item.observation||""}
                onChange={e=>updateItem(zoneIdx,idx,{observation:e.target.value})}
                style={C.inp({marginTop:8,height:56,fontSize:13})}
              />}
              {/* Media – photos + videos */}
              {item.status!=="pending"&&<div style={{marginTop:8,display:"flex",gap:7,alignItems:"center",flexWrap:"wrap"}}>
                <button onClick={()=>photoRefs.current[idx]?.click()} style={C.btn("ghost",{padding:"5px 10px",fontSize:12})}>📷 Photo{media.filter(m=>m.type==="photo").length>0?` (${media.filter(m=>m.type==="photo").length})`:""}</button>
                <input type="file" accept="image/*" capture="environment" style={{display:"none"}} ref={el=>photoRefs.current[idx]=el} onChange={e=>handlePhoto(idx,e)}/>
                <VideoCapture onCapture={m=>addMedia(idx,m)}/>
                {media.map((m,mi)=>
                  m.type==="photo"
                    ? <div key={mi} style={{position:"relative",width:56,height:56,borderRadius:6,overflow:"hidden",border:"1px solid var(--bd2)",flexShrink:0}}>
                        <img src={m.data} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                        <button onClick={()=>removeMedia(idx,mi)} style={{position:"absolute",top:1,right:1,background:"rgba(0,0,0,.7)",border:"none",color:"#fff",borderRadius:3,fontSize:9,cursor:"pointer",padding:"1px 3px"}}>✕</button>
                      </div>
                    : <VideoThumb key={mi} id={m.id} size={80} onRemove={()=>removeMedia(idx,mi)}/>
                )}
              </div>}
            </div>
            <Badge status={item.status}/>
          </div>
        </div>;
      })}
    </div>

    <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
      <button onClick={finishZone} disabled={!allDone} style={{...C.btn("pri",{padding:"12px 26px",fontSize:15}),opacity:allDone?1:0.35}}>
        {zoneIdx+1<total?"Next Zone →":"Complete ✓"}
      </button>
      {!allDone&&<Mono size={12}>Mark all items (✓ or !) before proceeding.</Mono>}
    </div>
  </div>;
}

function SummaryStep({inspection,submit,users,sending}){
  const user=users.find(u=>u.id===inspection.userId);
  const allFlags=inspection.zones.flatMap(z=>z.items.filter(i=>i.status==="flagged").map(i=>({...i,znm:ALL_ZONES.find(z2=>z2.id===z.zoneId)?.name})));
  const dur=inspection.endTime?fDur(inspection.endTime-inspection.startTime):"–";
  return <div style={{maxWidth:680,margin:"0 auto"}} className="fu">
    <div style={{...C.card({border:"1px solid var(--green)33",marginBottom:14,padding:"18px 20px"})}}>
      <div style={{fontSize:28,marginBottom:7}}>✅</div>
      <h1 style={{fontSize:22,marginBottom:3}}>Inspection Complete</h1>
      <Mono size={12}>{fD(inspection.startTime)} · {fT(inspection.startTime)}–{inspection.endTime?fT(inspection.endTime):"–"}{dur?` · ${dur}`:""}</Mono>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
      {[

function InspectView({step,users,authUser,roster,today,activeInsp,zoneIdx,startInspection,updateZoneItem,finishZone,submit,sending}){
  if(!authUser) return <div style={{textAlign:"center",padding:"60px 20px"}}>
    <div style={{fontSize:36,marginBottom:14}}>🔒</div>
    <div style={{fontWeight:700,color:"var(--t1)",fontSize:17,marginBottom:6}}>Sign in to start an inspection</div>
    <p style={{color:"var(--t2)",fontSize:14}}>Use the Sign In button in the top bar.</p>
  </div>;
  if(step==="select") return <SelectStep users={users} authUser={authUser} roster={roster} today={today} startInspection={startInspection}/>;
  if(step==="zone"&&activeInsp) return <ZoneStep inspection={activeInsp} zoneIdx={zoneIdx} updateItem={updateZoneItem} finishZone={finishZone} users={users}/>;
  if(step==="summary"&&activeInsp) return <SummaryStep inspection={activeInsp} submit={submit} users={users} sending={sending}/>;
  return null;
}

// ── ROSTER (matrix: rows=zones, cols=days) ───────────────────────────────────
function RosterView({roster,setRoster,users,authUser,today}){
  const isM=authUser?.role==="manager";
  const [cur,setCur]=useState(today);
  const [editCell,setEditCell]=useState(null); // {wk,day,slotIdx} or null for new slot
  const [ef,setEf]=useState({inspIds:[],supIds:[],zoneId:""});
  const [autoPlan,setAutoPlan]=useState(false);

  const wk=wkKey(cur);const{week,year}=isoWk(cur);const monday=getMon(cur);
  const dayDate=i=>{const d=new Date(monday);d.setDate(d.getDate()+i);return d;};
  const wkData=roster[wk]||{};

  // All unique zones in this week's data + ALL_ZONES first 5
  const visZones=()=>{
    const ids=new Set(ALL_ZONES.slice(0,5).map(z=>z.id));
    DAYS.forEach(d=>(wkData[d]||[]).forEach(s=>ids.add(s.zoneId)));
    return [...ids].map(id=>ALL_ZONES.find(z=>z.id===id)).filter(Boolean);
  };
  const zones=visZones();

  const getSlotsForZoneDay=(zoneId,day)=>(wkData[day]||[]).map((s,i)=>({...s,idx:i})).filter(s=>s.zoneId===zoneId);

  const openNew=(day,zoneId)=>{setEf({inspIds:[],supIds:[],zoneId});setEditCell({wk,day,slotIdx:-1});};
  const openEdit=(day,slotIdx,slot)=>{setEf({inspIds:[...(slot.inspectorIds||[])],supIds:[...(slot.supervisorIds||[])],zoneId:slot.zoneId});setEditCell({wk,day,slotIdx});};
  const saveSlot=()=>{
    if(!editCell||!ef.zoneId)return;
    const{wk:w,day,slotIdx}=editCell;
    const slot={inspectorIds:ef.inspIds,supervisorIds:ef.supIds,zoneId:ef.zoneId};
    setRoster(p=>{
      const dayArr=[...(p[w]?.[day]||[])];
      if(slotIdx===-1)dayArr.push(slot);else dayArr[slotIdx]=slot;
      return{...p,[w]:{...(p[w]||{}),[day]:dayArr}};
    });
    setEditCell(null);
  };
  const deleteSlot=(day,slotIdx)=>{
    setRoster(p=>({...p,[wk]:{...(p[wk]||{}),[day]:(p[wk]?.[day]||[]).filter((_,i)=>i!==slotIdx)}}));
  };
  const toggleId=(arr,id)=>arr.includes(id)?arr.filter(x=>x!==id):[...arr,id];

  const tdS={border:"1px solid var(--bd)",padding:"6px",verticalAlign:"top",minHeight:60};
  const thS={background:"var(--card2)",border:"1px solid var(--bd)",padding:"8px 10px",fontSize:13,fontWeight:700,color:"var(--t2)",textAlign:"center",whiteSpace:"nowrap"};

  return <div className="fu">
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18,flexWrap:"wrap",gap:12}}>
      <div>
        <h1 style={{fontSize:26,letterSpacing:"-.02em",marginBottom:4}}>Weekly Roster</h1>
        <Mono size={13}>Week {week} · {year} · {fS(monday)} – {fS(dayDate(6))}</Mono>
      </div>
      <div style={{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap"}}>
        <button onClick={()=>setCur(d=>{const dd=new Date(d);dd.setDate(dd.getDate()-7);return dd;})} style={C.btn("ghost",{padding:"7px 13px"})}>← Prev</button>
        <button onClick={()=>setCur(today)} style={C.btn("sec",{padding:"7px 11px"})}>Today</button>
        <button onClick={()=>setCur(d=>{const dd=new Date(d);dd.setDate(dd.getDate()+7);return dd;})} style={C.btn("ghost",{padding:"7px 13px"})}>Next →</button>
        {isM&&<button onClick={()=>setAutoPlan(true)} style={C.btn("pri",{padding:"7px 13px",fontSize:13,display:"flex",alignItems:"center",gap:6})}>⚡ Auto-Plan</button>}
      </div>
    </div>

    {!isM&&<div style={{background:"var(--abg)",border:"1px solid var(--abd)",borderRadius:8,padding:"9px 14px",marginBottom:14,fontSize:14,color:"var(--amber)"}}>👁 View-only. Managers can edit.</div>}

    <div style={{overflowX:"auto",borderRadius:12,border:"1px solid var(--bd)"}}>
      <table style={{width:"100%",borderCollapse:"collapse",minWidth:700}}>
        <thead>
          <tr>
            <th style={{...thS,textAlign:"left",padding:"8px 12px",width:160}}>Zone</th>
            {DAYS.map((d,i)=>{
              const dd=dayDate(i);const isT=dd.toDateString()===today.toDateString();
              return <th key={d} style={{...thS,color:isT?"var(--amber)":"var(--t2)",background:isT?"var(--abg)":thS.background}}>
                {d}<br/><span style={{fontWeight:400,fontSize:11}}>{fS(dd)}</span>
              </th>;
            })}
          </tr>
        </thead>
        <tbody>
          {zones.map(zone=><tr key={zone.id}>
            <td style={{...tdS,background:"var(--card2)"}}>
              <Mono size={12} color="var(--blue)" style={{background:"var(--bbg)",padding:"2px 7px",borderRadius:4,display:"inline-block",marginBottom:4}}>{zone.id}</Mono>
              <div style={{fontSize:13,fontWeight:600,color:"var(--t1)"}}>{zone.name}</div>
            </td>
            {DAYS.map((day,di)=>{
              const dd=dayDate(di);const isT=dd.toDateString()===today.toDateString();
              const slots=getSlotsForZoneDay(zone.id,day);
              return <td key={day} style={{...tdS,background:isT?"var(--abg)":"transparent",minWidth:110}}>
                <div style={{display:"flex",flexDirection:"column",gap:4}}>
                  {slots.map(s=>{
                    const insps=(s.inspectorIds||[]).map(id=>users.find(u=>u.id===id)).filter(Boolean);
                    const sups=(s.supervisorIds||[]).map(id=>users.find(u=>u.id===id)).filter(Boolean);
                    return <div key={s.idx} style={{background:"var(--surf)",borderRadius:6,padding:"5px 7px",border:"1px solid var(--bd2)"}}>
                      {insps.map((u,j)=><div key={j} style={{display:"flex",alignItems:"center",gap:5,marginBottom:sups.length>0&&j===insps.length-1?3:2}}>
                        <Avatar user={u} size={20}/><span style={{fontSize:11,fontWeight:600,color:"var(--t1)"}}>{u.name.split(" ")[0]}</span>
                      </div>)}
                      {sups.map((u,j)=><div key={j} style={{display:"flex",alignItems:"center",gap:4}}>
                        <Avatar user={u} size={16}/><span style={{fontSize:10,color:"var(--amber)"}}>{u.name.split(" ")[0]}</span><Mono size={8} color="var(--t3)">sup</Mono>
                      </div>)}
                      {isM&&<button onClick={()=>openEdit(day,s.idx,s)} style={{background:"none",border:"none",cursor:"pointer",fontSize:10,color:"var(--t3)",padding:"1px 3px",marginTop:2}}>Edit ✏️</button>}
                      {isM&&<button onClick={()=>deleteSlot(day,s.idx)} style={{background:"none",border:"none",cursor:"pointer",fontSize:10,color:"var(--red)",padding:"1px 3px"}}>✕</button>}
                    </div>;
                  })}
                  {isM&&<button onClick={()=>openNew(day,zone.id)} style={{background:"transparent",border:"1px dashed var(--bd2)",borderRadius:5,padding:"3px 0",color:"var(--t3)",cursor:"pointer",fontSize:11,width:"100%",textAlign:"center"}}>+</button>}
                </div>
              </td>;
            })}
          </tr>)}
        </tbody>
      </table>
    </div>

    {/* Add/Edit slot modal */}
    {editCell&&<Modal onClose={()=>setEditCell(null)} title={editCell.slotIdx===-1?"Add Slot":"Edit Slot"} maxW={460}>
      <Lbl>Zone</Lbl>
      <select value={ef.zoneId} onChange={e=>setEf(f=>({...f,zoneId:e.target.value}))} style={C.inp({marginBottom:12})}>
        <option value="">— Select —</option>
        {ALL_ZONES.map(z=><option key={z.id} value={z.id}>{z.id} – {z.name}</option>)}
      </select>
      <Lbl>Inspectors (select multiple)</Lbl>
      <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:12}}>
        {users.filter(u=>u.role==="inspector").map(u=><label key={u.id} style={{display:"flex",alignItems:"center",gap:9,padding:"7px 10px",background:"var(--surf)",borderRadius:8,border:`1px solid ${ef.inspIds.includes(u.id)?"var(--blue)":"var(--bd)"}`,cursor:"pointer"}}>
          <input type="checkbox" checked={ef.inspIds.includes(u.id)} onChange={()=>setEf(f=>({...f,inspIds:toggleId(f.inspIds,u.id)}))} style={{accentColor:"var(--blue)",width:15,height:15}}/>
          <Avatar user={u} size={26}/>
          <span style={{fontSize:14,fontWeight:600,color:"var(--t1)"}}>{u.name}</span>
        </label>)}
      </div>
      <Lbl>Supervisor / Manager</Lbl>
      <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:16}}>
        {users.filter(u=>u.role==="manager").map(u=><label key={u.id} style={{display:"flex",alignItems:"center",gap:9,padding:"7px 10px",background:"var(--surf)",borderRadius:8,border:`1px solid ${ef.supIds.includes(u.id)?"var(--amber)":"var(--bd)"}`,cursor:"pointer"}}>
          <input type="checkbox" checked={ef.supIds.includes(u.id)} onChange={()=>setEf(f=>({...f,supIds:toggleId(f.supIds,u.id)}))} style={{accentColor:"var(--amber)",width:15,height:15}}/>
          <Avatar user={u} size={26}/>
          <span style={{fontSize:14,fontWeight:600,color:"var(--t1)"}}>{u.name}</span>
          <Mono size={11} color="var(--amber)">supervisor</Mono>
        </label>)}
      </div>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button onClick={()=>setEditCell(null)} style={C.btn("ghost")}>Cancel</button>
        <button onClick={saveSlot} disabled={!ef.zoneId||ef.inspIds.length===0} style={{...C.btn("pri"),opacity:(!ef.zoneId||ef.inspIds.length===0)?0.35:1}}>Save</button>
      </div>
    </Modal>}

    {autoPlan&&<AutoPlanModal users={users} roster={roster} setRoster={setRoster} onClose={()=>setAutoPlan(false)} today={today}/>}
  </div>;
}

// ── AUTO-PLAN MODAL ───────────────────────────────────────────────────────────
function AutoPlanModal({users,roster,setRoster,onClose,today}){
  const inspectors=users.filter(u=>u.role==="inspector");
  const [startDate,setStartDate]=useState(()=>{const d=getMon(today);d.setDate(d.getDate()+7);return d.toISOString().split("T")[0];});
  const [numWeeks,setNumWeeks]=useState(4);
  const [selDays,setSelDays]=useState(["Mon","Tue","Wed","Thu","Fri"]);
  const [selInsp,setSelInsp]=useState(inspectors.map(u=>u.id));
  const [selZones,setSelZones]=useState(ALL_ZONES.slice(0,5).map(z=>z.id));
  const [supId,setSupId]=useState("");
  const [preview,setPreview]=useState(null);
  const [done,setDone]=useState(false);

  const toggleArr=(arr,v)=>arr.includes(v)?arr.filter(x=>x!==v):[...arr,v];

  const generate=()=>{
    if(selInsp.length===0||selZones.length===0||selDays.length===0)return;
    const plan={};
    const start=getMon(new Date(startDate+"T00:00:00"));
    for(let w=0;w<numWeeks;w++){
      const d=new Date(start);d.setDate(d.getDate()+w*7);
      const wk=wkKey(d);
      plan[wk]={};
      for(const day of selDays){
        // One slot per inspector; zone rotates by (inspIdx + weekOffset) % numZones
        plan[wk][day]=selInsp.map((inspId,iIdx)=>({
          inspectorIds:[inspId],
          supervisorIds:supId?[supId]:[],
          zoneId:selZones[(iIdx+w)%selZones.length],
        }));
      }
    }
    setPreview(plan);
  };

  const apply=()=>{
    setRoster(p=>{
      const merged={...p};
      Object.entries(preview).forEach(([wk,wkData])=>{merged[wk]={...(merged[wk]||{}),...wkData};});
      return merged;
    });
    setDone(true);
  };

  const managers=users.filter(u=>u.role==="manager");

  return <Modal onClose={onClose} title="⚡ Auto-Plan Roster" maxW={560}>
    {done
      ? <div style={{textAlign:"center",padding:"24px 0"}}>
          <div style={{fontSize:36,marginBottom:12}}>✅</div>
          <div style={{fontWeight:700,fontSize:16,color:"var(--t1)",marginBottom:6}}>Plan applied!</div>
          <p style={{fontSize:14,color:"var(--t2)",marginBottom:20}}>{numWeeks} weeks, {selDays.length} days/week, {selInsp.length} inspectors across {selZones.length} zones (rotating).</p>
          <button onClick={onClose} style={C.btn("pri",{padding:"10px 24px"})}>Done</button>
        </div>
      : <>
        {/* Config */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
          <div><Lbl>Starting Week</Lbl><input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)} style={C.inp()}/></div>
          <div><Lbl>Duration (weeks)</Lbl><select value={numWeeks} onChange={e=>setNumWeeks(Number(e.target.value))} style={C.inp()}>
            {[2,4,6,8,12,16,26,52].map(n=><option key={n} value={n}>{n} weeks{n===4?" (1 month)":n===12?" (3 months)":n===26?" (6 months)":n===52?" (1 year)":""}</option>)}
          </select></div>
        </div>
        <Lbl>Inspect On</Lbl>
        <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
          {DAYS.map(d=><button key={d} onClick={()=>setSelDays(a=>toggleArr(a,d))} style={{...C.btn(selDays.includes(d)?"pri":"ghost",{padding:"6px 11px",fontSize:13}),opacity:1}}>{d}</button>)}
        </div>
        <Lbl>Inspectors to rotate</Lbl>
        <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:14}}>
          {inspectors.map(u=><label key={u.id} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 10px",background:selInsp.includes(u.id)?"var(--bbg)":"var(--surf)",border:`1px solid ${selInsp.includes(u.id)?"var(--blue)":"var(--bd)"}`,borderRadius:20,cursor:"pointer"}}>
            <input type="checkbox" checked={selInsp.includes(u.id)} onChange={()=>setSelInsp(a=>toggleArr(a,u.id))} style={{accentColor:"var(--blue)",width:13,height:13}}/>
            <Avatar user={u} size={20}/>
            <span style={{fontSize:13,fontWeight:600,color:"var(--t1)"}}>{u.name.split(" ")[0]}</span>
          </label>)}
        </div>
        <Lbl>Zones to rotate ({selZones.length} selected)</Lbl>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
          {ALL_ZONES.map(z=><button key={z.id} onClick={()=>setSelZones(a=>toggleArr(a,z.id))} style={{...C.btn(selZones.includes(z.id)?"pri":"ghost",{padding:"5px 9px",fontSize:12}),opacity:1}}>{z.id}</button>)}
        </div>
        <Lbl>Assign Supervisor to all slots (optional)</Lbl>
        <select value={supId} onChange={e=>setSupId(e.target.value)} style={C.inp({marginBottom:16})}>
          <option value="">None</option>
          {managers.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
        </select>

        {/* Rotation preview info */}
        <div style={{background:"var(--bbg)",border:"1px solid var(--blue)22",borderRadius:8,padding:"10px 13px",marginBottom:16,fontSize:13,color:"var(--t2)"}}>
          <strong style={{color:"var(--t1)"}}>Rotation logic:</strong> Each week, every inspector shifts one zone. After {selZones.length} weeks, each inspector will have covered all {selZones.length} zones once before repeating.
        </div>

        {preview&&<div style={{background:"var(--gbg)",border:"1px solid var(--green)22",borderRadius:8,padding:"10px 13px",marginBottom:14,fontSize:13,color:"var(--t2)"}}>
          ✓ Preview ready: <strong style={{color:"var(--t1)"}}>{Object.keys(preview).length} weeks</strong>, <strong>{Object.values(preview).flatMap(w=>Object.values(w)).flat().length} total slots</strong>. Click Apply to commit to roster.
        </div>}

        <div style={{display:"flex",gap:9,justifyContent:"flex-end",flexWrap:"wrap"}}>
          <button onClick={onClose} style={C.btn("ghost")}>Cancel</button>
          {!preview
            ? <button onClick={generate} disabled={selInsp.length===0||selZones.length===0||selDays.length===0} style={{...C.btn("sec",{padding:"9px 18px"}),opacity:(selInsp.length&&selZones.length&&selDays.length)?1:.35}}>Preview →</button>
            : <><button onClick={()=>setPreview(null)} style={C.btn("sec",{padding:"9px 16px"})}>Re-configure</button>
               <button onClick={apply} style={C.btn("pri",{padding:"9px 20px"})}>✓ Apply Plan</button></>
          }
        </div>
      </>
    }
  </Modal>;
}

// ── YEAR PLAN ─────────────────────────────────────────────────────────────────
function YearPlanView({roster,setRoster,users,today,authUser}){
  const isM=authUser?.role==="manager";
  const [yr,setYr]=useState(today.getFullYear());
  const [mode,setMode]=useState("full");
  const [autoPlan,setAutoPlan]=useState(false);
  const todayWk=wkKey(today);

  const weeks=[];const d=new Date(getMon(new Date(yr,0,1)));
  while(weeks.length<=53){const{week,year:wy}=isoWk(d);if(wy>yr)break;if(wy===yr){const wk=`${wy}-W${String(week).padStart(2,"0")}`;const end=new Date(d);end.setDate(end.getDate()+6);weeks.push({wk,week,monday:new Date(d),end,data:roster[wk]||{}});}d.setDate(d.getDate()+7);}

  const thS={background:"var(--card2)",border:"1px solid var(--bd)",padding:"7px 6px",textAlign:"center",fontSize:12,fontWeight:700,color:"var(--t2)",position:"sticky",top:0};
  const tdS={border:"1px solid var(--bd)",padding:"4px 3px",textAlign:"center",verticalAlign:"middle"};

  return <div className="fu">
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:12}}>
      <div>
        <h1 style={{fontSize:26,letterSpacing:"-.02em",marginBottom:4}}>Year Roster Plan</h1>
        <Mono size={13}>Full-year view · {yr}</Mono>
      </div>
      <div style={{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap"}}>
        <div style={{display:"flex",background:"var(--surf)",border:"1px solid var(--bd)",borderRadius:8,overflow:"hidden"}}>
          {[{id:"full",l:"Names"},{id:"dot",l:"Compact"}].map(m=><button key={m.id} onClick={()=>setMode(m.id)} style={{padding:"6px 12px",fontSize:13,border:"none",cursor:"pointer",background:mode===m.id?"var(--amber)":"transparent",color:mode===m.id?"#fff":"var(--t2)",fontFamily:"'DM Sans',sans-serif",fontWeight:600}}>{m.l}</button>)}
        </div>
        {isM&&<button onClick={()=>setAutoPlan(true)} style={C.btn("pri",{padding:"6px 12px",fontSize:13})}>⚡ Auto-Plan</button>}
        <button onClick={()=>setYr(y=>y-1)} style={C.btn("ghost",{padding:"6px 11px",fontSize:13})}>← {yr-1}</button>
        <button onClick={()=>setYr(today.getFullYear())} style={C.btn("sec",{padding:"6px 10px",fontSize:13})}>This Year</button>
        <button onClick={()=>setYr(y=>y+1)} style={C.btn("ghost",{padding:"6px 11px",fontSize:13})}>{yr+1} →</button>
      </div>
    </div>
    {/* Legend */}
    <div style={{display:"flex",gap:7,marginBottom:12,flexWrap:"wrap"}}>
      {users.map(u=><div key={u.id} style={{display:"flex",alignItems:"center",gap:6,background:"var(--card)",border:"1px solid var(--bd)",borderRadius:20,padding:"3px 10px"}}>
        <div style={{width:9,height:9,borderRadius:"50%",background:u.color}}/><span style={{fontSize:13,color:"var(--t2)",fontWeight:500}}>{u.name.split(" ")[0]} <Mono size={11} color="var(--t3)">({u.id})</Mono></span>
      </div>)}
    </div>
    <div style={{overflowX:"auto",borderRadius:12,border:"1px solid var(--bd)"}}>
      <table style={{width:"100%",borderCollapse:"collapse",minWidth:560}}>
        <thead><tr>
          <th style={{...thS,textAlign:"left",padding:"7px 12px",width:55}}><Mono size={11}>Wk</Mono></th>
          <th style={{...thS,textAlign:"left",width:70}}><Mono size={11}>Dates</Mono></th>
          {DAYS.map(d=><th key={d} style={{...thS,minWidth:mode==="full"?95:42}}><Mono size={11}>{d}</Mono></th>)}
        </tr></thead>
        <tbody>{weeks.map(({wk,week,monday,end,data})=>{
          const isC=wk===todayWk;
          return <tr key={wk} style={{background:isC?"var(--abg)":"transparent"}}>
            <td style={{...tdS,textAlign:"left",padding:"5px 12px"}}><Mono size={12} color={isC?"var(--amber)":"var(--t3)"} style={{fontWeight:isC?700:400,whiteSpace:"nowrap"}}>{isC?"▶ ":""}{`W${String(week).padStart(2,"0")}`}</Mono></td>
            <td style={{...tdS,textAlign:"left",padding:"5px 8px"}}><Mono size={11} style={{whiteSpace:"nowrap"}}>{fS(monday)}–{fS(end)}</Mono></td>
            {DAYS.map(day=>{
              const slots=data[day]||[];
              return <td key={day} style={tdS}>
                {mode==="full"
                  ? <div style={{display:"flex",flexDirection:"column",gap:2,padding:"2px"}}>
                      {slots.slice(0,3).map((s,i)=>{
                        const u=users.find(u=>(s.inspectorIds||[]).includes(u.id));
                        return <div key={i} title={`${u?.name} → ${s.zoneId}`} style={{fontSize:9,fontWeight:700,background:u?.color?`${u.color}22`:"var(--card2)",color:"var(--t1)",borderRadius:3,padding:"1px 4px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:88,display:"flex",alignItems:"center",gap:3}}>
                          <span style={{width:5,height:5,borderRadius:"50%",background:u?.color||"var(--blue)",flexShrink:0}}/>{u?.name?.split(" ")[0]||"?"} <Mono size={8} color="var(--t3)">{s.zoneId}</Mono>
                        </div>;
                      })}
                      {slots.length>3&&<Mono size={9} color="var(--t3)">+{slots.length-3} more</Mono>}
                    </div>
                  : <div style={{display:"flex",justifyContent:"center",gap:2,flexWrap:"wrap",padding:"4px 2px"}}>
                      {slots.length===0?<div style={{width:8,height:8,borderRadius:"50%",background:"var(--bd)"}}/>:
                        slots.map((s,i)=>{const u=users.find(u=>(s.inspectorIds||[]).includes(u.id));return <div key={i} title={`${u?.name} – ${s.zoneId}`} style={{width:9,height:9,borderRadius:"50%",background:u?.color||"var(--blue)"}}/>;})
                      }
                    </div>
                }
              </td>;
            })}
          </tr>;
        })}</tbody>
      </table>
    </div>
    {autoPlan&&<AutoPlanModal users={users} roster={roster} setRoster={setRoster} onClose={()=>setAutoPlan(false)} today={today}/>}
  </div>;
}

// ── SETTINGS ──────────────────────────────────────────────────────────────────
// ── ADMIN PANEL (hamburger menu) ──────────────────────────────────────────────
const USER_COLORS=["#3b82f6","#8b5cf6","#06b6d4","#10b981","#f59e0b","#ec4899","#ef4444","#f97316","#84cc16","#14b8a6"];
function AdminPanel({authUser,users,setUsers,ejConfig,setEjConfig,onClose}){
  const isM=authUser?.role==="manager";
  const [tab,setTab]=useState(isM?"team":"pin");
  const [ps,setPs]=useState("old");const [np,setNp]=useState("");const [pm,setPm]=useState("");
  const handleOld=p=>{if(p===authUser.pin){setPs("new");setPm("");}else{setPm("Incorrect PIN.");}};
  const handleNew=p=>{setNp(p);setPs("confirm");};
  const handleConf=p=>{if(p===np){setUsers(prev=>prev.map(u=>u.id===authUser.id?{...u,pin:p}:u));setPm("✓ Updated!");setPs("done");}else{setPm("PINs don't match.");setPs("new");}};
  const [editingUser,setEditingUser]=useState(null);
  const [addingUser,setAddingUser]=useState(false);
  const [newUser,setNewUser]=useState({name:"",role:"inspector",email:"",color:USER_COLORS[0]});
  const saveUserEdit=(id,fields)=>{setUsers(p=>p.map(u=>u.id===id?{...u,...fields}:u));setEditingUser(null);};
  const removeUser=id=>{if(!window.confirm("Remove this team member?"))return;setUsers(p=>p.filter(u=>u.id!==id));};
  const addUser=()=>{
    if(!newUser.name.trim())return;
    const initials=newUser.name.trim().split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
    const id=(newUser.role==="manager"?"M":"U")+String(Date.now()).slice(-4);
    setUsers(p=>[...p,{id,name:newUser.name.trim(),role:newUser.role,initials,color:newUser.color,pin:"1234",email:newUser.email.trim()}]);
    setNewUser({name:"",role:"inspector",email:"",color:USER_COLORS[0]});setAddingUser(false);
  };
  const [ej,setEj]=useState({...ejConfig});
  const [testMsg,setTestMsg]=useState("");const [testing,setTesting]=useState(false);
  const configured=!!(ej.publicKey&&ej.serviceId&&ej.templateId);
  const saveEj=()=>{setEjConfig({...ej});setTestMsg("✅ Saved.");setTimeout(()=>setTestMsg(""),3000);};
  const testEmail=async()=>{
    if(!configured){setTestMsg("Fill in all three fields first.");return;}
    setTesting(true);setTestMsg("");
    const tc={html:`<!DOCTYPE html><html><body style="font-family:Arial;padding:24px;background:#f3f4f6;"><div style="max-width:500px;margin:0 auto;background:#fff;border-radius:10px;padding:28px;"><h2 style="color:#0d1b2e;margin:0 0 8px;">InspectPro – Test ✅</h2><p style="color:#6b7280;">EmailJS is configured correctly.</p><p style="font-size:13px;margin-top:16px;">Sent by: <strong>${authUser.name}</strong> · ${fD(Date.now())}</p></div></body></html>`,plainText:`InspectPro Test\nSent by: ${authUser.name}`};
    const res=await sendEmail(authUser.email?.trim()||"test@example.com",authUser.name,"InspectPro – Test Email",tc,ej);
    setTesting(false);setTestMsg(res.ok?"✅ Sent! Check inbox.":`❌ ${res.err||"Unknown error"}`);
  };
  return <Modal onClose={onClose} title="Menu" maxW={540}>
    <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 13px",background:"var(--surf)",borderRadius:9,border:"1px solid var(--bd)",marginBottom:16}}>
      <Avatar user={authUser} size={38}/>
      <div style={{flex:1}}><div style={{fontWeight:700,fontSize:15,color:"var(--t1)"}}>{authUser.name}</div><Mono size={12}>{authUser.role.toUpperCase()} · {authUser.id}</Mono></div>
      {isM&&<span style={{fontSize:11,background:"var(--abg)",color:"var(--amber)",padding:"3px 8px",borderRadius:20,fontWeight:700}}>Manager</span>}
    </div>
    <div style={{display:"flex",gap:5,marginBottom:18,flexWrap:"wrap"}}>
      <button onClick={()=>setTab("pin")} style={C.btn(tab==="pin"?"pri":"ghost",{padding:"7px 12px",fontSize:13})}>🔑 PIN</button>
      {isM&&<><button onClick={()=>setTab("team")} style={C.btn(tab==="team"?"pri":"ghost",{padding:"7px 12px",fontSize:13})}>👥 Team</button>
      <button onClick={()=>setTab("email")} style={C.btn(tab==="email"?"pri":"ghost",{padding:"7px 12px",fontSize:13})}>📧 Email</button>
      <button onClick={()=>setTab("whatsapp")} style={C.btn(tab==="whatsapp"?"pri":"ghost",{padding:"7px 12px",fontSize:13})}>📱 WhatsApp</button></>}
    </div>
    {tab==="pin"&&<div>
      {ps==="done"
        ? <div style={{textAlign:"center",padding:"16px 0"}}><div style={{fontSize:28,marginBottom:10}}>✅</div><div style={{fontWeight:700,color:"var(--t1)",marginBottom:10}}>PIN updated</div><button onClick={()=>{setPs("old");setNp("");setPm("");}} style={C.btn("sec")}>Change again</button></div>
        : <PinPad onComplete={ps==="old"?handleOld:ps==="new"?handleNew:handleConf} label={ps==="old"?"Current PIN":ps==="new"?"New PIN":"Confirm new PIN"} error={pm}/>
      }
    </div>}
    {tab==="team"&&<div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <span style={{fontWeight:700,fontSize:15,color:"var(--t1)"}}>{users.length} members</span>
        <button onClick={()=>setAddingUser(true)} style={C.btn("pri",{padding:"6px 13px",fontSize:13})}>+ Add</button>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:7,maxHeight:340,overflowY:"auto"}}>
        {users.map(u=>(editingUser?.id===u.id
          ? <div key={u.id} style={{background:"var(--surf)",border:"1px solid var(--blue)",borderRadius:10,padding:"13px 14px"}}>
              <Lbl>Name</Lbl><input value={editingUser.name} onChange={e=>setEditingUser(p=>({...p,name:e.target.value}))} style={C.inp({marginBottom:8})}/>
              <Lbl>Email</Lbl><input type="email" value={editingUser.email||""} onChange={e=>setEditingUser(p=>({...p,email:e.target.value}))} placeholder="name@example.com" style={C.inp({marginBottom:8})}/>
              <Lbl>Role</Lbl>
              <select value={editingUser.role} onChange={e=>setEditingUser(p=>({...p,role:e.target.value}))} style={C.inp({marginBottom:8})}>
                <option value="inspector">Inspector</option><option value="manager">Manager</option>
              </select>
              <Lbl>Colour</Lbl>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>{USER_COLORS.map(c=><button key={c} onClick={()=>setEditingUser(p=>({...p,color:c}))} style={{width:24,height:24,borderRadius:"50%",background:c,border:editingUser.color===c?"3px solid var(--t1)":"2px solid transparent",cursor:"pointer"}}/>)}</div>
              <div style={{display:"flex",gap:7}}><button onClick={()=>saveUserEdit(u.id,editingUser)} style={C.btn("pri",{flex:1,padding:"8px"})}>Save</button><button onClick={()=>setEditingUser(null)} style={C.btn("ghost",{padding:"8px 12px"})}>Cancel</button></div>
            </div>
          : <div key={u.id} style={{display:"flex",alignItems:"center",gap:10,background:"var(--surf)",border:"1px solid var(--bd)",borderRadius:10,padding:"10px 13px"}}>
              <Avatar user={u} size={34}/>
              <div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,fontSize:14,color:"var(--t1)"}}>{u.name}</div><Mono size={11}>{u.role.toUpperCase()} · {u.id}{u.email?` · ${u.email}`:""}</Mono></div>
              <div style={{display:"flex",gap:5,flexShrink:0}}>
                <button onClick={()=>setEditingUser({...u})} style={C.btn("ghost",{padding:"4px 9px",fontSize:12})}>Edit</button>
                <button onClick={()=>setUsers(p=>p.map(uu=>uu.id===u.id?{...uu,pin:"1234"}:uu))} style={C.btn("sec",{padding:"4px 9px",fontSize:12})}>↺ PIN</button>
                {u.id!==authUser.id&&<button onClick={()=>removeUser(u.id)} style={C.btn("dng",{padding:"4px 8px",fontSize:12})}>✕</button>}
              </div>
            </div>
        ))}
      </div>
      <p style={{fontSize:12,color:"var(--t3)",marginTop:8}}>New members get PIN 1234. They should change on first login.</p>
      {addingUser&&<div style={{marginTop:12,background:"var(--surf)",border:"1px solid var(--green)33",borderRadius:10,padding:"13px"}}>
        <div style={{fontWeight:700,fontSize:14,color:"var(--t1)",marginBottom:11}}>New Team Member</div>
        <Lbl>Name</Lbl><input value={newUser.name} onChange={e=>setNewUser(p=>({...p,name:e.target.value}))} placeholder="Full name" style={C.inp({marginBottom:8})}/>
        <Lbl>Email</Lbl><input type="email" value={newUser.email} onChange={e=>setNewUser(p=>({...p,email:e.target.value}))} placeholder="name@example.com" style={C.inp({marginBottom:8})}/>
        <Lbl>Role</Lbl>
        <select value={newUser.role} onChange={e=>setNewUser(p=>({...p,role:e.target.value}))} style={C.inp({marginBottom:8})}><option value="inspector">Inspector</option><option value="manager">Manager</option></select>
        <Lbl>Colour</Lbl>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>{USER_COLORS.map(c=><button key={c} onClick={()=>setNewUser(p=>({...p,color:c}))} style={{width:24,height:24,borderRadius:"50%",background:c,border:newUser.color===c?"3px solid var(--t1)":"2px solid transparent",cursor:"pointer"}}/>)}</div>
        <div style={{display:"flex",gap:7}}><button onClick={addUser} disabled={!newUser.name.trim()} style={{...C.btn("pri",{flex:1,padding:"9px"}),opacity:newUser.name.trim()?1:.35}}>Add</button><button onClick={()=>setAddingUser(false)} style={C.btn("ghost",{padding:"9px 12px"})}>Cancel</button></div>
      </div>}
    </div>}
    {tab==="email"&&<div style={{display:"flex",flexDirection:"column",gap:11}}>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 13px",background:configured?"var(--cl-bg)":"var(--pd-bg)",border:`1px solid ${configured?"var(--green)33":"var(--bd)"}`,borderRadius:9}}>
        <span style={{fontSize:18}}>{configured?"✅":"⚙️"}</span>
        <div><div style={{fontWeight:700,fontSize:13,color:configured?"var(--cl-fg)":"var(--t1)"}}>{configured?"EmailJS active":"Not configured – emails simulated"}</div></div>
      </div>
      <div><Lbl>Public Key</Lbl><input value={ej.publicKey} onChange={e=>setEj(c=>({...c,publicKey:e.target.value.trim()}))} style={C.inp({fontFamily:"'DM Mono',monospace",fontSize:13})}/></div>
      <div><Lbl>Service ID</Lbl><input value={ej.serviceId} onChange={e=>setEj(c=>({...c,serviceId:e.target.value.trim()}))} style={C.inp({fontFamily:"'DM Mono',monospace",fontSize:13})}/></div>
      <div><Lbl>Template ID</Lbl><input value={ej.templateId} onChange={e=>setEj(c=>({...c,templateId:e.target.value.trim()}))} style={C.inp({fontFamily:"'DM Mono',monospace",fontSize:13})}/>
        <p style={{fontSize:12,color:"var(--t3)",marginTop:5}}>Template body must use <strong style={{color:"var(--red)"}}>triple braces</strong>: <Mono size={11} color="var(--cyan)">{"{{{body_html}}}"}</Mono> and type <strong>HTML</strong>.</p>
      </div>
      {testMsg&&<div style={{padding:"8px 12px",borderRadius:7,fontSize:13,background:testMsg.startsWith("✅")?"var(--cl-bg)":"var(--op-bg)",color:testMsg.startsWith("✅")?"var(--cl-fg)":"var(--op-fg)"}}>{testMsg}</div>}

function Lightbox({items, startIdx=0, onClose}) {
  const [idx,setIdx] = useState(startIdx);
  const item = items[idx];
  const prev = () => setIdx(i => (i-1+items.length)%items.length);
  const next = () => setIdx(i => (i+1)%items.length);
  useEffect(()=>{
    const h=e=>{
      if(e.key==="Escape")onClose();
      if(e.key==="ArrowLeft")prev();
      if(e.key==="ArrowRight")next();
    };
    document.addEventListener("keydown",h);
    return()=>document.removeEventListener("keydown",h);
  },[idx]);

  return <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.92)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    {/* Counter */}
    <div style={{position:"absolute",top:16,left:"50%",transform:"translateX(-50%)",background:"rgba(0,0,0,.6)",color:"#fff",fontSize:13,padding:"4px 12px",borderRadius:20,pointerEvents:"none"}}>
      {idx+1} / {items.length}
    </div>
    {/* Close */}
    <button onClick={onClose} style={{position:"absolute",top:14,right:16,background:"rgba(255,255,255,.15)",border:"none",color:"#fff",fontSize:22,cursor:"pointer",borderRadius:8,width:38,height:38,display:"flex",alignItems:"center",justifyContent:"center",zIndex:1}}>✕</button>
    {/* Prev */}
    {items.length>1&&<button onClick={e=>{e.stopPropagation();prev();}} style={{position:"absolute",left:12,background:"rgba(255,255,255,.15)",border:"none",color:"#fff",fontSize:22,cursor:"pointer",borderRadius:8,width:44,height:44,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>}
    {/* Media */}
    <div onClick={e=>e.stopPropagation()} style={{maxWidth:"95vw",maxHeight:"88vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
      {item?.type==="photo"
        ? <img src={item.data} style={{maxWidth:"90vw",maxHeight:"85vh",borderRadius:8,objectFit:"contain",boxShadow:"0 8px 40px rgba(0,0,0,.6)"}} alt=""/>
        : <VideoThumb id={item?.id} size={Math.min(window.innerWidth*0.85, window.innerHeight*0.75)}/>
      }
    </div>
    {/* Caption */}
    {item?.caption&&<div style={{position:"absolute",bottom:16,left:"50%",transform:"translateX(-50%)",background:"rgba(0,0,0,.7)",color:"#fff",fontSize:13,padding:"6px 14px",borderRadius:20,maxWidth:"80vw",textAlign:"center",pointerEvents:"none"}}>{item.caption}</div>}
    {/* Next */}
    {items.length>1&&<button onClick={e=>{e.stopPropagation();next();}} style={{position:"absolute",right:12,background:"rgba(255,255,255,.15)",border:"none",color:"#fff",fontSize:22,cursor:"pointer",borderRadius:8,width:44,height:44,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>}
  </div>;
}

// ── SEED ──────────────────────────────────────────────────────────────────────
function seedRoster(users){
  const today=new Date(),wk=wkKey(today);
  const insps=users.filter(u=>u.role==="inspector");
  const zones=ALL_ZONES.slice(0,5);
  const days=["Mon","Tue","Wed","Thu","Fri"];
  const r={[wk]:{}};
  for(const day of days){
    r[wk][day]=insps.map((u,i)=>({inspectorIds:[u.id],supervisorIds:i===0?[users.find(u=>u.role==="manager")?.id].filter(Boolean):[],zoneId:zones[i%zones.length].id}));
  }
  return r;
}

function App(){
  const saved=LS.load("ip_v1");
  const [users,setUsers]=useState(()=>{const u=saved?.users;return u&&u.length===DEF_USERS.length?u:DEF_USERS;});
  const [roster,setRoster]=useState(()=>saved?.roster??seedRoster(DEF_USERS));
  const [insp,setInsp]=useState(saved?.insp??[]);
  const [tracker,setTracker]=useState(saved?.tracker??[]);
  const [theme,setTheme]=useState(saved?.theme??"dark");
  const [ejConfig,setEjConfig]=useState(()=>saved?.ejConfig??{publicKey:"FCXGhGYhKSY8mzokZ",serviceId:"service_pkta469",templateId:"template_q8tfqju"});
  const [authUser,setAuthUser]=useState(null);
  const [showLogin,setShowLogin]=useState(false);
  const [showAdmin,setShowAdmin]=useState(false);
  const [view,setView]=useState("home");
  const [inspStep,setInspStep]=useState("select");
  const [activeInsp,setActiveInsp]=useState(null);
  const [zoneIdx,setZoneIdx]=useState(0);
  const [sending,setSending]=useState(false);
  const [dbReady,setDbReady]=useState(false);

  // Initialise IndexedDB for video persistence
  useEffect(()=>{ VIDDB.init().then(()=>setDbReady(true)); },[]);

  useEffect(()=>{document.documentElement.setAttribute("data-theme",theme);},[theme]);
  useEffect(()=>{LS.save("ip_v1",{users,roster,insp,tracker,theme,ejConfig});},[users,roster,insp,tracker,theme,ejConfig]);

  const today=new Date();
  const nav=v=>{setView(v);if(v!=="inspect")setInspStep("select");};
  const handleLogin=u=>{setAuthUser(u);setShowLogin(false);};
  const handleLogout=()=>{setAuthUser(null);setActiveInsp(null);setInspStep("select");};

  const startInspection=(userId,zoneId)=>{
    const zone=ALL_ZONES.find(z=>z.id===zoneId);if(!zone)return;
    const zones=[{zoneId,startTime:Date.now(),endTime:null,items:zone.items.map((label,i)=>({idx:i,label,status:"pending",observation:"",media:[]}))}];
    setActiveInsp({id:uid(),userId,zoneId,date:today.toISOString().split("T")[0],startTime:Date.now(),endTime:null,zones,reportSent:false});
    setZoneIdx(0);setInspStep("zone");
  };

  const updateZoneItem=(zi,ii,upd)=>setActiveInsp(p=>({...p,zones:p.zones.map((z,zi2)=>zi2!==zi?z:{...z,items:z.items.map((it,ii2)=>ii2!==ii?it:{...it,...upd})})}));

  const finishZone=()=>{
    setActiveInsp(p=>{const zones=p.zones.map((z,i)=>i===zoneIdx?{...z,endTime:Date.now()}:z);return{...p,zones,endTime:Date.now()};});
    setInspStep("summary");
  };

  const submitInspection=async()=>{
    setSending(true);
    const rec={...activeInsp,reportSent:true};
    setInsp(p=>[...p,rec]);
    // Tracker issues
    const issues=rec.zones.flatMap(z=>z.items.filter(i=>i.status==="flagged").map(item=>({
      id:uid(),inspectionId:rec.id,zoneId:z.zoneId,zoneName:ALL_ZONES.find(zz=>zz.id===z.zoneId)?.name,
      itemLabel:item.label,observation:item.observation||"",
      media:(item.media||[]).map(m=>m.type==="photo"?m:{type:"video",id:m.id,size:m.size,name:m.name}),
      status:"open",createdBy:rec.userId,createdAt:Date.now(),updatedAt:Date.now(),notes:[],
    })));
    if(issues.length)setTracker(p=>[...p,...issues]);
    // Email – send to inspector + ALL managers (even if inspector is a manager)
    const inspector=users.find(u=>u.id===rec.userId);
    const content=await buildEmailContent(rec,users);
    const subj=`InspectPro Report – ${inspector?.name} – ${fD(rec.startTime)}`;
    const emailTargets=[];
    // Inspector gets their own copy
    if(inspector?.email?.trim()) emailTargets.push({email:inspector.email.trim(),name:inspector.name,subj});
    // All managers get a copy (tagged [InspectPro])
    users.filter(u=>u.role==="manager"&&u.email?.trim()).forEach(m=>{
      // avoid duplicate if inspector is also a manager
      if(!emailTargets.find(t=>t.email===m.email.trim()))
        emailTargets.push({email:m.email.trim(),name:m.name,subj:`[InspectPro] ${subj}`});
    });
    console.log("Sending report to:",emailTargets.map(t=>t.email));
    const results=await Promise.allSettled(emailTargets.map(t=>sendEmail(t.email,t.name,t.subj,content,ejConfig)));
    results.forEach((r,i)=>{
      if(r.status==="fulfilled"&&r.value?.ok) console.log("✓ Sent to",emailTargets[i].email);
      else console.warn("✗ Failed",emailTargets[i].email, r.reason||r.value?.err);
    });
    setSending(false);
    setActiveInsp(null);setInspStep("select");setZoneIdx(0);
    setView("reports");
  };

  return <div style={{fontFamily:"'DM Sans',sans-serif",background:"var(--bg)",minHeight:"100vh",color:"var(--t1)",transition:"background .25s"}}>
    <NavBar view={view} nav={nav} authUser={authUser} onSignIn={()=>setShowLogin(true)} onSignOut={handleLogout} theme={theme} setTheme={setTheme} onAdmin={()=>authUser?setShowAdmin(true):setShowLogin(true)}/>
    <div className="main-pad" style={{maxWidth:1140,margin:"0 auto"}}>
      {view==="home"    &&<HomeView today={today} authUser={authUser} users={users} roster={roster} setRoster={setRoster} tracker={tracker} inspections={insp} nav={nav}/>}
      {view==="inspect" &&<InspectView step={inspStep} users={users} authUser={authUser} roster={roster} today={today} activeInsp={activeInsp} zoneIdx={zoneIdx} startInspection={startInspection} updateZoneItem={updateZoneItem} finishZone={finishZone} submit={submitInspection} sending={sending}/>}
      {view==="tracker" &&<TrackerView tracker={tracker} setTracker={setTracker} users={users}/>}
      {view==="roster"  &&<RosterView roster={roster} setRoster={setRoster} users={users} authUser={authUser} today={today}/>}
      {view==="yearplan"&&<YearPlanView roster={roster} setRoster={setRoster} users={users} today={today} authUser={authUser}/>}
      {view==="reports" &&<ReportsView inspections={insp} users={users} tracker={tracker} ejConfig={ejConfig} theme={theme}/>}
    </div>
    {!authUser&&<div onClick={()=>setShowLogin(true)} style={{position:"fixed",bottom:"calc(72px + env(safe-area-inset-bottom,0px))",right:18,background:"var(--amber)",color:"#fff",fontWeight:700,fontSize:14,padding:"11px 20px",borderRadius:40,cursor:"pointer",boxShadow:"0 4px 20px rgba(0,0,0,.35)",display:"flex",alignItems:"center",gap:7,zIndex:100}}>🔑 Sign In</div>}
    {showLogin&&<LoginModal users={users} onLogin={handleLogin} onClose={()=>setShowLogin(false)}/>}
    {showAdmin&&authUser&&<AdminPanel authUser={authUser} users={users} setUsers={setUsers} ejConfig={ejConfig} setEjConfig={setEjConfig} onClose={()=>setShowAdmin(false)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
